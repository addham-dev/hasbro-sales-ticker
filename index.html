<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasbro EU Sales Ticker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:       #009CDE;
      --blue-dark:  #0077A8;
      --blue-light: #E5F6FF;
      --white:      #ffffff;
      --bg:         #F0F8FC;
      --text:       #003A54;
      --text2:      #5A8DA0;
      --text3:      #A0C8D8;
      --border:     #D0EAF5;
      --green:      #00B388;
      --green-bg:   #E5FFF6;
      --shadow:     0 2px 16px rgba(0,156,222,0.10);
      --shadow-lg:  0 8px 32px rgba(0,156,222,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; min-height:100vh; }

    header {
      background:var(--blue); padding:0 40px;
      display:flex; align-items:center; justify-content:space-between;
      height:72px; box-shadow:0 4px 20px rgba(0,156,222,0.3);
    }
    .logo { display:flex; align-items:center; gap:16px; }
    .logo-mark {
      width:44px; height:44px; background:white; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; font-weight:900; color:var(--blue);
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
    }
    .logo-info { display:flex; flex-direction:column; }
    .logo-text { font-size:22px; font-weight:800; color:white; line-height:1.1; }
    .logo-sub  { font-size:11px; color:rgba(255,255,255,0.75); font-weight:600; letter-spacing:1px; text-transform:uppercase; }
    .header-right { display:flex; align-items:center; gap:16px; }
    .live-badge {
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,0.2); border-radius:20px; padding:6px 14px;
      font-size:12px; font-weight:700; color:white; letter-spacing:1px; text-transform:uppercase;
    }
    .live-dot { width:8px; height:8px; background:#7DFFD0; border-radius:50%; animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    .last-updated { font-size:12px; color:rgba(255,255,255,0.7); font-weight:600; }

    main { max-width:1280px; margin:0 auto; padding:32px 40px 60px; }

    .lookback-tabs {
      display:flex; gap:6px; background:white; border-radius:10px;
      padding:4px; box-shadow:var(--shadow); margin-bottom:28px; width:fit-content;
    }
    .tab-btn {
      font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
      padding:8px 20px; border:none; border-radius:7px; cursor:pointer;
      transition:all 0.18s; background:transparent; color:var(--text2);
    }
    .tab-btn:hover { background:var(--blue-light); color:var(--blue); }
    .tab-btn.active { background:var(--blue); color:white; box-shadow:0 2px 8px rgba(0,156,222,0.3); }
    .tab-btn.dim { opacity:0.4; }

    .section-title { font-size:13px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--text2); margin-bottom:20px; }

    .market-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:36px; }
    .market-card {
      background:white; border-radius:16px; box-shadow:var(--shadow); overflow:hidden;
      transition:transform 0.2s,box-shadow 0.2s;
    }
    .market-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
    .card-top {
      padding:18px 22px 14px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .card-left { display:flex; align-items:center; gap:10px; }
    .card-flag { font-size:24px; }
    .card-name { font-size:15px; font-weight:800; color:var(--text); }
    .card-code { font-size:11px; color:var(--text2); font-weight:600; letter-spacing:1px; }
    .dot { width:8px; height:8px; border-radius:50%; }
    .dot.green { background:var(--green); }
    .dot.grey  { background:var(--text3); }
    .card-body { padding:20px 22px; }
    .card-rev {
      font-size:36px; font-weight:900; color:var(--text);
      line-height:1; margin-bottom:4px; letter-spacing:-1px;
    }
    .card-rev .cur { font-size:18px; color:var(--text2); font-weight:700; margin-right:2px; }
    .card-units { font-family:'DM Mono',monospace; font-size:12px; color:var(--text2); margin-bottom:16px; }
    .card-foot {
      display:flex; align-items:center; justify-content:space-between;
      padding-top:14px; border-top:1px solid var(--border);
    }
    .card-age { font-size:11px; color:var(--text3); font-weight:600; }
    .tag-live {
      font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
      color:var(--green); background:var(--green-bg); padding:3px 8px; border-radius:4px;
    }
    .tag-none {
      font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
      color:var(--text3); background:var(--border); padding:3px 8px; border-radius:4px;
    }

    .table-card { background:white; border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
    .table-toolbar {
      padding:18px 24px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    }
    .mkt-filters { display:flex; gap:6px; }
    .mkt-btn {
      font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
      padding:5px 14px; border-radius:6px; border:2px solid var(--border);
      background:transparent; color:var(--text2); cursor:pointer; transition:all 0.15s;
    }
    .mkt-btn:hover { border-color:var(--blue); color:var(--blue); }
    .mkt-btn.active { background:var(--blue-light); border-color:var(--blue); color:var(--blue); }
    .tbl-count { font-size:12px; color:var(--text2); font-weight:600; }

    table { width:100%; border-collapse:collapse; }
    thead th {
      padding:10px 16px; font-size:11px; font-weight:800; letter-spacing:1px;
      text-transform:uppercase; color:var(--text2); background:var(--bg);
      text-align:left; border-bottom:1px solid var(--border); white-space:nowrap;
    }
    th.r { text-align:right; }
    tbody tr { border-bottom:1px solid #F0F7FC; transition:background 0.1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--blue-light); }
    td { padding:11px 16px; font-size:13px; }
    .t-rank { font-family:'DM Mono',monospace; font-size:11px; color:var(--text3); width:36px; }
    .badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:800; padding:3px 8px; border-radius:5px; }
    .badge.GB { background:#E5F3FF; color:#005EA8; }
    .badge.DE { background:#FFF8E0; color:#8A6A00; }
    .badge.FR { background:#FFF0F0; color:#C0392B; }
    .t-asin { font-family:'DM Mono',monospace; font-size:11px; color:var(--text2); }
    .t-title { color:var(--text); font-weight:600; max-width:380px; }
    .t-rev { font-family:'DM Mono',monospace; font-weight:700; text-align:right; white-space:nowrap; }
    .t-units { font-family:'DM Mono',monospace; font-size:12px; color:var(--text2); text-align:right; }

    .empty { text-align:center; padding:60px 20px; }
    .empty-icon { font-size:40px; margin-bottom:12px; }
    .empty-title { font-size:18px; font-weight:800; color:var(--text); margin-bottom:6px; }
    .empty-sub { font-size:14px; color:var(--text2); font-weight:600; }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media(max-width:900px){
      main{padding:20px;}
      .market-grid{grid-template-columns:1fr;}
      header{padding:0 20px;}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">H</div>
    <div class="logo-info">
      <div class="logo-text">Hasbro EU</div>
      <div class="logo-sub">Sales Ticker · Amazon</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <div class="last-updated" id="last-updated">Connecting…</div>
  </div>
</header>

<main>
  <div class="lookback-tabs" id="tabs">
    <button class="tab-btn active" data-h="2">2H</button>
    <button class="tab-btn dim"    data-h="4">4H</button>
    <button class="tab-btn dim"    data-h="8">8H</button>
    <button class="tab-btn dim"    data-h="12">12H</button>
    <button class="tab-btn dim"    data-h="24">24H</button>
    <button class="tab-btn dim"    data-h="48">48H</button>
  </div>

  <div class="section-title">Market Summary</div>
  <div class="market-grid" id="cards">
    <div style="grid-column:1/-1"><div class="empty"><div class="spinner"></div><div class="empty-title">Loading…</div></div></div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <div class="section-title" style="margin:0">Top ASINs</div>
      <div class="mkt-filters" id="mkt-filters">
        <button class="mkt-btn active" data-m="ALL">All</button>
        <button class="mkt-btn" data-m="GB">🇬🇧 GB</button>
        <button class="mkt-btn" data-m="DE">🇩🇪 DE</button>
        <button class="mkt-btn" data-m="FR">🇫🇷 FR</button>
      </div>
      <div class="tbl-count" id="tbl-count"></div>
    </div>
    <div id="tbl-wrap">
      <div class="empty"><div class="spinner"></div><div class="empty-title">Loading…</div></div>
    </div>
  </div>
</main>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const SB_URL = 'https://rycqfwzgvpzwhphgclpb.supabase.co';
const SB_KEY = 'sb_publishable_CbKFhpN2dWI_UXhwGkclqw_AMPSprs4';
const FLAGS  = { GB:'🇬🇧', DE:'🇩🇪', FR:'🇫🇷' };
const NAMES  = { GB:'United Kingdom', DE:'Germany', FR:'France' };

let hours   = 2;
let market  = 'ALL';
let rows    = [];   // current ASIN rows
let avail   = new Set(); // which lookback_hours have data

// ── Supabase ──────────────────────────────────────────────────────────────
async function sb(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers:{ 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}` }
  });
  return r.ok ? r.json() : null;
}

// ── Main load ─────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('last-updated').textContent = 'Refreshing…';

  // Step 1 — find every available lookback_hours and the latest captured_at per market+hours
  // We pull the last 10000 rows of just the index columns (fast)
  const index = await sb(
    `sales_snapshots?select=market,lookback_hours,captured_at&order=captured_at.desc&limit=10000`
  );

  if (!index || index.length === 0) { noData(); return; }

  // Build: { "GB_2": "2026-04-28T11:53:...", ... }
  const latestTs = {};
  for (const r of index) {
    const k = `${r.market}_${r.lookback_hours}`;
    if (!latestTs[k]) latestTs[k] = r.captured_at;
    avail.add(Number(r.lookback_hours));
  }

  updateTabs();

  // Step 2 — fetch ASIN rows for selected hours, each market separately
  rows = [];
  for (const m of ['GB','DE','FR']) {
    const k  = `${m}_${hours}`;
    const ts = latestTs[k];
    if (!ts) continue;

    const data = await sb(
      `sales_snapshots?market=eq.${m}&lookback_hours=eq.${hours}&captured_at=eq.${encodeURIComponent(ts)}&select=market,asin,product_title,ordered_revenue,ordered_units,captured_at&order=ordered_revenue.desc&limit=500`
    );
    if (data) rows.push(...data);
  }

  renderCards(latestTs);
  renderTable();

  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// ── Market cards ──────────────────────────────────────────────────────────
function renderCards(latestTs) {
  document.getElementById('cards').innerHTML = ['GB','DE','FR'].map(m => {
    const k    = `${m}_${hours}`;
    const ts   = latestTs[k];
    const mRow = rows.filter(r => r.market === m && r.ordered_revenue > 0);
    const rev  = mRow.reduce((s,r) => s + r.ordered_revenue, 0);
    const unit = mRow.reduce((s,r) => s + (r.ordered_units||0), 0);

    if (!ts || mRow.length === 0) return `
      <div class="market-card">
        <div class="card-top">
          <div class="card-left">
            <span class="card-flag">${FLAGS[m]}</span>
            <div><div class="card-name">${NAMES[m]}</div><div class="card-code">${m}</div></div>
          </div>
          <div class="dot grey"></div>
        </div>
        <div class="card-body">
          <div class="card-rev"><span class="cur">€</span>—</div>
          <div class="card-units">No ${hours}H data — open Vendor Central ${m} with ${hours}H selected</div>
          <div class="card-foot"><div class="card-age">—</div><div class="tag-none">No data</div></div>
        </div>
      </div>`;

    return `
      <div class="market-card">
        <div class="card-top">
          <div class="card-left">
            <span class="card-flag">${FLAGS[m]}</span>
            <div><div class="card-name">${NAMES[m]}</div><div class="card-code">${m}</div></div>
          </div>
          <div class="dot green"></div>
        </div>
        <div class="card-body">
          <div class="card-rev"><span class="cur">€</span>${fmt(rev)}</div>
          <div class="card-units">${unit.toLocaleString()} units</div>
          <div class="card-foot">
            <div class="card-age">Captured ${ago(ts)}</div>
            <div class="tag-live">${hours}H Window</div>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── ASIN table ────────────────────────────────────────────────────────────
function renderTable() {
  let data = rows.filter(r => r.ordered_revenue > 0);
  if (market !== 'ALL') data = data.filter(r => r.market === market);
  data = data.sort((a,b) => b.ordered_revenue - a.ordered_revenue).slice(0,100);

  document.getElementById('tbl-count').textContent = data.length + ' products';

  if (data.length === 0) {
    document.getElementById('tbl-wrap').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-title">No data for ${hours}H window</div>
        <div class="empty-sub">On Vendor Central, set Lookback to ${hours} hours then reload the page</div>
      </div>`;
    return;
  }

  document.getElementById('tbl-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Market</th><th>ASIN</th><th>Product</th>
        <th class="r">Revenue</th><th class="r">Units</th>
      </tr></thead>
      <tbody>
        ${data.map((r,i) => `
          <tr>
            <td class="t-rank">${i+1}</td>
            <td><span class="badge ${r.market}">${FLAGS[r.market]} ${r.market}</span></td>
            <td class="t-asin">${r.asin||'—'}</td>
            <td class="t-title">${r.product_title ? clip(r.product_title,60) : '—'}</td>
            <td class="t-rev">€${fmt(r.ordered_revenue)}</td>
            <td class="t-units">${(r.ordered_units||0).toLocaleString()}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function updateTabs() {
  document.querySelectorAll('.tab-btn').forEach(b => {
    const h = Number(b.dataset.h);
    b.classList.toggle('active', h === hours);
    b.classList.toggle('dim',    !avail.has(h));
  });
}

function noData() {
  document.getElementById('cards').innerHTML = `
    <div style="grid-column:1/-1"><div class="empty">
      <div class="empty-icon">🔌</div>
      <div class="empty-title">No data found</div>
      <div class="empty-sub">Open Vendor Central Real-time Sales and let the extension capture</div>
    </div></div>`;
  document.getElementById('last-updated').textContent = 'No data';
}

// ── Events ────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const b = e.target.closest('.tab-btn');
  if (!b) return;
  hours = Number(b.dataset.h);
  load();
});

document.getElementById('mkt-filters').addEventListener('click', e => {
  const b = e.target.closest('.mkt-btn');
  if (!b) return;
  market = b.dataset.m;
  document.querySelectorAll('.mkt-btn').forEach(x => x.classList.toggle('active', x===b));
  renderTable();
});

// ── Helpers ───────────────────────────────────────────────────────────────
const fmt  = n => n == null ? '—' : Number(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
const clip = (s,n) => s.length > n ? s.slice(0,n)+'…' : s;
const ago  = iso => {
  const s = (Date.now()-new Date(iso))/1000;
  if (s < 60)    return 'just now';
  if (s < 3600)  return Math.round(s/60)+'m ago';
  if (s < 86400) return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
};

// ── Init ──────────────────────────────────────────────────────────────────
load();
setInterval(load, 5*60*1000);
</script>
</body>
</html>
